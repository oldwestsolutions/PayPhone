# Fast checks on every push / PR
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web (Next.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build marketing site
        run: npm run build

  desktop-rust:
    name: Desktop (Rust check)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: cargo check
        run: cargo check --manifest-path apps/desktop/src-tauri/Cargo.toml

  desktop-ts:
    name: Desktop (TypeScript build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck and build frontend
        run: npm run build -w @payphone/desktop

  smoke:
    name: API smoke test
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
    env:
      MONGODB_URL: mongodb://localhost:27017/payphone
      PAYPHONE_DEMO_MODE: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Start backend services
        run: |
          node services/intent-shim/server.mjs &
          node services/routing-engine/server.mjs &
          node services/ledger-service/server.mjs &
          node services/telephony-shim/server.mjs &
          node services/escrow-shim/server.mjs &
          node apps/gateway/src/server.js &
          for i in $(seq 1 30); do
            curl -sf http://localhost:4008/health >/dev/null &&
            curl -sf http://localhost:4009/health >/dev/null &&
            curl -sf http://localhost:4012/health >/dev/null &&
            curl -sf http://localhost:4010/health >/dev/null &&
            curl -sf http://localhost:4004/health >/dev/null &&
            curl -sf http://localhost:4000/health >/dev/null && break
            sleep 2
          done
          curl -sf http://localhost:4008/health
          curl -sf http://localhost:4009/health
          curl -sf http://localhost:4012/health
          curl -sf http://localhost:4010/health
          curl -sf http://localhost:4004/health
          curl -sf http://localhost:4000/health

      - name: Run smoke test
        run: npm run smoke-test
