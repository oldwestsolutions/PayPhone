# Fast checks on every push / PR
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web (Next.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build marketing site
        run: npm run build

  desktop-rust:
    name: Desktop (Rust check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: cargo check
        run: cargo check --manifest-path apps/desktop/src-tauri/Cargo.toml

  smoke:
    name: API smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Start backend shims
        run: |
          node services/telephony-shim/server.mjs &
          node services/escrow-shim/server.mjs &
          node apps/gateway/src/server.js &
          for i in $(seq 1 15); do
            curl -sf http://localhost:4010/health >/dev/null &&
            curl -sf http://localhost:4004/health >/dev/null &&
            curl -sf http://localhost:4000/health >/dev/null && break
            sleep 2
          done
          curl -sf http://localhost:4010/health
          curl -sf http://localhost:4004/health
          curl -sf http://localhost:4000/health

      - name: Run smoke test
        run: npm run smoke-test
